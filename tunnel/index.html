<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conectando ao Servidor...</title>
    <style>
        body { background: #11111b; color: #cdd6f4; font-family: sans-serif; text-align: center; padding-top: 15%; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #fab387; display: inline-block; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="spinner"></div>
    <h2>Sincronizando com o Servidor Mobile...</h2>
    <p style="opacity:0.6;">Aguarde alguns instantes enquanto estabelecemos a conexão segura.</p>

    <script>
        // Caminho do seu arquivo TXT bruto no GitHub
        // Se o seu repositório for público, você pode usar a URL do raw.githubusercontent
        const urlDoTxt = 'https://raw.githubusercontent.com/Gigllyan/cv/main/tunel/tunnel_url.txt';

        async function redirecionar() {
            try {
                // Busca o conteúdo do arquivo de texto (adicionando um timestamp para evitar o cache do navegador)
                const resposta = await fetch(urlDoTxt + '?t=' + new Date().getTime());
                const urlTunnel = await resposta.text();
                
                // Valida se o texto baixado realmente é a URL da Cloudflare
                if (urlTunnel.includes('trycloudflare.com')) {
                    window.location.href = urlTunnel.trim();
                } else {
                    document.querySelector('h2').innerText = "Servidor Offline";
                    document.querySelector('p').innerText = "O painel móvel não está ativo no momento.";
                }
            } catch (erro) {
                console.error("Erro ao buscar a URL:", erro);
                document.querySelector('h2').innerText = "Erro de Conexão";
            }
        }

        // Executa a função após carregar a página
        redirecionar();
    </script>
</body>
</html>
