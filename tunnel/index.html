<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conectando ao Servidor...</title>
    <style>
        body { background: #11111b; color: #cdd6f4; font-family: sans-serif; text-align: center; padding-top: 15%; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #fab387; display: inline-block; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="spinner"></div>
    <h2>Sincronizando com o Servidor Mobile...</h2>
    <p id="status-text" style="opacity:0.6;">Aguarde alguns instantes enquanto estabelecemos a conexão segura.</p>

    <script>
        // 🌟 CORREÇÃO CRÍTICA: Lendo o arquivo usando o mesmo domínio do GitHub Pages
        // Isso evita o erro de CORS (bloqueio do navegador)
        const urlDoTxt = 'https://gigllyan.github.io/cv/tunnel/tunnel_url.txt';

        async function redirecionar() {
            try {
                // O '?t=' + new Date().getTime() força o navegador a pegar o link novo e ignorar o cache antigo
                const resposta = await fetch(urlDoTxt + '?t=' + new Date().getTime());
                
                if (!resposta.ok) {
                    throw new Error("Arquivo não encontrado no servidor do GitHub");
                }

                const urlTunnel = await resposta.text();
                
                // Valida se o texto baixado realmente contém o padrão da Cloudflare
                if (urlTunnel.includes('trycloudflare.com')) {
                    document.getElementById('status-text').innerText = "Conexão estabelecida! Redirecionando...";
                    window.location.href = urlTunnel.trim();
                } else {
                    document.querySelector('h2').innerText = "Servidor Offline";
                    document.getElementById('status-text').innerText = "O painel móvel não está ativo ou o link expirou.";
                }
            } catch (erro) {
                console.error("Erro ao buscar a URL:", erro);
                document.querySelector('h2').innerText = "Aguardando Sincronização";
                document.getElementById('status-text').innerText = "Verificando arquivos na nuvem... Atualize a página em 5 segundos.";
            }
        }

        // Executa a função imediatamente ao abrir a página
        redirecionar();
    </script>
</body>
</html>
